<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美股產業鏈共振分析儀 Pro</title>
<style>
/* 保持原本你喜歡的樣式，僅增加動態輸入區樣式 */
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; }
#setup { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
.setup-card { background: #fff; border-radius: 16px; border: 1px solid #e0e0d8; padding: 2rem 2.5rem; max-width: 500px; width: 100%; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
.badge-pro { display: inline-block; background: #fff7ed; color: #c2410c; border: 1px solid #fed7aa; border-radius: 99px; font-size: 11px; padding: 2px 10px; margin-bottom: 1rem; font-weight: 600; }
input[type="password"], textarea, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; margin-bottom: 10px; background: #fafafa; }
.btn-primary { width: 100%; padding: 12px; background: #f97316; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: 0.2s; }

#app { display: none; max-width: 1400px; margin: 0 auto; padding: 1.5rem; }
.top-bar { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 15px; margin-bottom: 15px; }
.pulse-box { background: #fff3e0; border: 1px dashed #f97316; padding: 12px; border-radius: 10px; margin-bottom: 15px; }
.pulse-box h4 { font-size: 12px; color: #e65100; margin-bottom: 8px; display: flex; align-items: center; gap: 5px; }
.pulse-box textarea { height: 60px; margin-bottom: 0; border-color: #ffcc80; background: #fff; font-size: 12px; }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }
.card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 16px; transition: 0.2s; position: relative; }
.card.hot { border-top: 4px solid #ef4444; background: #fffafb; }
.card-name { font-size: 15px; font-weight: 700; color: #111827; }
.tag { font-size: 11px; padding: 4px 10px; border-radius: 6px; background: #f3f4f6; border: 1px solid #e5e7eb; font-family: monospace; color: #1f2937; text-decoration: none; display: inline-block; margin: 2px; }
.reason { font-size: 12px; color: #6b7280; margin: 8px 0; line-height: 1.4; }
.spin { display: inline-block; width: 18px; height: 18px; border: 3px solid #eee; border-top-color: #f97316; border-radius: 50%; animation: rot .8s linear infinite; margin-right: 10px; }
@keyframes rot { to{transform:rotate(360deg)} }
</style>
</head>
<body>

<div id="setup">
  <div class="setup-card">
    <span class="badge-pro">DATA-SYNERGY 數據共振版</span>
    <h1>📊 產業鏈深度追蹤儀</h1>
    <label>Groq API Key</label>
    <input type="password" id="keyInput" placeholder="gsk_..." />
    <button class="btn-primary" id="startBtn">啟動 AI 交易分析大腦 →</button>
  </div>
</div>

<div id="app">
  <div class="top-bar">
    <div class="app-title"><h3>市場極細分板塊 (100)</h3></div>
    <div class="controls">
      <button class="btn-primary" id="refBtn" style="padding: 8px 20px;">↻ 執行數據共振分析</button>
      <button id="resetBtn" style="border:none; background:none; color:#999; cursor:pointer; font-size:12px; margin-left:10px;">重設 Key</button>
    </div>
  </div>

  <div class="pulse-box">
    <h4>📡 今日市場脈搏 (請貼上盤前/盤後異動股或最新熱點新聞)</h4>
    <textarea id="marketPulse" placeholder="例如：NVDA 財報大超預期，液冷概念股 VRT, SMCI 盤前飆升 10%... 或直接貼上今日漲幅榜清單"></textarea>
  </div>

  <div id="grid" class="grid"></div>
</div>

<script>
var sectors = [], apiKey = '';

// --- 強化版 PROMPT：加入「共振邏輯」與「動態脈搏」 ---
var PROMPT = function(today, pulse) {
  return `今天是 ${today}。你是華爾街頂級產業鏈分析師。
  
  【當前市場數據注入】:
  "${pulse || '目前暫無特定異動數據，請按長線產業鏈邏輯分析。'}"

  【核心任務】列出美股 100 個「極細分」板塊，並按熱度排序。
  【群體共振邏輯】:
  1. 優先識別「群體性移動」：如果上述注入數據中有 2 檔以上股票屬於同一細分產業，該板塊必須排在 Rank 1-10。
  2. 排除噪音：單一股票的異動若無產業邏輯支撐，請降低其權重。
  3. 產業鏈延伸：若「變壓器」熱炒，必須聯動分析其上游「矽鋼/銅材」與下游「電網建設」。

  每個板塊提供 5 個代碼。回傳純 JSON 格式：
  {"sectors":[{"rank":1,"name":"細分名稱","category":"分類","heat":"hot","reason":"分析師點評(含共振原因)","stocks":["T1","T2","T3","T4","T5"]}]}`;
};

async function callGroq(prompt) {
  const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
    body: JSON.stringify({
      model: 'llama-3.3-70b-versatile',
      messages: [{ role: 'system', content: 'You are a JSON stock analyst focused on sector clusters.' }, { role: 'user', content: prompt }],
      temperature: 0.5, // 降低隨機性，增加邏輯嚴謹度
      response_format: { type: "json_object" }
    })
  });
  const data = await res.json();
  return data.choices[0].message.content;
}

function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = sectors.map(s => `
    <div class="card ${s.heat}">
      <div style="display:flex; justify-content:space-between; align-items:flex-start;">
        <div class="card-name">${s.rank}. ${s.name}</div>
        <span style="font-size:10px; color:#f97316; font-weight:700;">${s.category}</span>
      </div>
      <div class="reason">${s.reason}</div>
      <div class="stocks">
        ${s.stocks.map(t => `<a href="https://www.tradingview.com/symbols/${t}/" target="_blank" class="tag">${t}</a>`).join('')}
      </div>
    </div>
  `).join('');
}

async function loadData() {
  const btn = document.getElementById('refBtn');
  const pulse = document.getElementById('marketPulse').value;
  btn.disabled = true;
  document.getElementById('grid').innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:100px;"><span class="spin"></span>正在進行群體共振分析，挖掘最強產業鏈...</div>';
  
  try {
    const raw = await callGroq(PROMPT(new Date().toLocaleDateString(), pulse));
    sectors = JSON.parse(raw).sectors;
    render();
  } catch (e) {
    alert('分析失敗，請檢查 Key 或網路');
  } finally {
    btn.disabled = false;
  }
}

document.getElementById('startBtn').onclick = () => {
  apiKey = document.getElementById('keyInput').value.trim();
  if(!apiKey.startsWith('gsk_')) return alert('Key 格式不正確');
  localStorage.setItem('groq_stock_key', apiKey);
  document.getElementById('setup').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  loadData();
};

document.getElementById('refBtn').onclick = loadData;
document.getElementById('resetBtn').onclick = () => { localStorage.clear(); location.reload(); };

window.onload = () => {
  const saved = localStorage.getItem('groq_stock_key');
  if(saved) {
    apiKey = saved;
    document.getElementById('setup').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadData();
  }
};
</script>
</body>
</html>
