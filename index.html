<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美股產業鏈分析儀 v2.3 (供應鏈聯動版)</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; }
#setup { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
.setup-card { background: #fff; border-radius: 16px; border: 1px solid #e0e0d8; padding: 2rem 2.5rem; max-width: 520px; width: 100%; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
.badge { display: inline-block; background: #fff7ed; color: #c2410c; border: 1px solid #fed7aa; border-radius: 99px; font-size: 11px; padding: 2px 10px; margin-bottom: 1rem; font-weight: 600; }
input[type="password"], textarea { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; margin-bottom: 10px; background: #fafafa; }
.btn-primary { width: 100%; padding: 12px; background: #f97316; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
#app { display: none; max-width: 1400px; margin: 0 auto; padding: 1.5rem; }
.top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.pulse-box { background: #fff; border: 1px solid #fed7aa; border-left: 4px solid #f97316; padding: 12px 14px; border-radius: 10px; margin-bottom: 14px; }
.pulse-box textarea { height: 80px; font-size: 12px; resize: none; margin-bottom: 5px; border-color: #fde68a; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; }
.card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 16px; position: relative; transition: 0.2s; }
.card.hot { border-top: 4px solid #ef4444; background: #fffafb; }
.card-header { display: flex; justify-content: space-between; margin-bottom: 8px; align-items: flex-start; }
.card-name { font-size: 15px; font-weight: 700; color: #111827; flex: 1; }
.reason { font-size: 12px; color: #4b5563; line-height: 1.5; margin-bottom: 10px; }
.stocks { display: flex; flex-wrap: wrap; gap: 5px; }
.tag { font-size: 11px; padding: 3px 8px; border-radius: 5px; background: #f3f4f6; border: 1px solid #e5e7eb; text-decoration: none; color: #1f2937; font-family: monospace; font-weight: 600; }
.tag:hover { background: #dbeafe; border-color: #93c5fd; color: #1e40af; }
.conf-badge { font-size: 10px; padding: 2px 7px; border-radius: 4px; font-weight: 700; text-transform: uppercase; }
.high { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
.low { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
.spin { display: inline-block; width: 16px; height: 16px; border: 2px solid #eee; border-top-color: #f97316; border-radius: 50%; animation: rot .8s linear infinite; }
@keyframes rot { to{transform:rotate(360deg)} }
</style>
</head>
<body>

<div id="setup">
  <div class="setup-card">
    <span class="badge">V2.3 供應鏈聯動版</span>
    <h1 style="font-size:22px; margin-bottom:10px;">📊 產業鏈共振分析儀</h1>
    <p style="font-size:13px; color:#6b7280; margin-bottom:20px;">識別單點爆發，推演隱形股群</p>
    <input type="password" id="keyInput" placeholder="Groq API Key (gsk_...)" />
    <button class="btn-primary" id="startBtn">啟動 AI 供應鏈掃描儀 →</button>
  </div>
</div>

<div id="app">
  <div class="top-bar">
    <h3>美股實時產業鏈分析 <span id="lastUpdate" style="font-size:12px; color:#999; font-weight:normal;"></span></h3>
    <div>
      <button class="btn-primary" id="refBtn" style="padding: 6px 15px; font-size: 13px;">重新掃描市場</button>
      <button onclick="localStorage.clear();location.reload();" style="font-size:12px; border:none; background:none; color:#9ca3af; cursor:pointer; margin-left:10px;">重設</button>
    </div>
  </div>

  <div class="pulse-box">
    <h4>📡 數據注入窗口 (市場異動/政策消息)</h4>
    <textarea id="marketPulse" placeholder="範例：波音 BA 獲得大額轉移訂單爆量；或者 量子電腦 IONQ, RGTI 板塊集體異動..."></textarea>
    <p style="font-size:11px; color:#f97316; font-weight:500;">提示：輸入單一龍頭異動，AI 將自動帶出其背後的供應鏈股群。</p>
  </div>

  <div id="grid" class="grid"></div>
</div>

<script>
var apiKey = '', sectors = [];

// 核心邏輯 v2.3：強化單一龍頭與供應鏈推演
const BUILD_PROMPT = (pulse, tickers) => `
今天是 ${new Date().toLocaleDateString()}。你是頂級產業分析師。
市場異動股：${tickers.join(', ')}
用戶補充消息：${pulse}

【任務：結構性異動推演】
1. 單點觸發效應：若有單一龍頭(如 Boeing, NVDA, TSLA)因重大消息暴漲，即便供應商尚未異動，也必須將該「供應鏈板塊」排在 Rank 1-3。
2. 自動補全股群：在該板塊下，必須列出該龍頭及其 3-4 個關鍵供應商或同業競爭者。
3. 結構性移轉判定：若涉及合約轉移(如 SpaceX 轉向 Boeing)、份額變動，請標註為「產業重估」。
4. 噪音過濾：區分「產業基本面利多」與「公司內部噪音」。
   - 技術/合約/訂單 = High Confidence (🔥 產業推進)。
   - 股權變動/行政管理/非業務支撐 = Low Confidence (⚠️ 公司噪音)。

回傳純 JSON: {"sectors":[{"rank":1,"name":"細分名稱","conf":"high/low","reason":"分析點評(需註明領漲龍頭對全鏈的帶動力)","stocks":["龍頭代碼","供應商A","供應商B"]}]}
`;

async function callGroq(prompt) {
  const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
    body: JSON.stringify({
      model: 'llama-3.3-70b-versatile',
      messages: [
        { role: 'system', content: 'You are a JSON-only Wall Street analyst. Focus on supply chain linkage.' },
        { role: 'user', content: prompt }
      ],
      response_format: { type: "json_object" },
      temperature: 0.2, // 降低隨機性，增加邏輯穩定性
      max_tokens: 4000
    })
  });
  const data = await res.json();
  if(!res.ok) throw new Error(data.error.message);
  return JSON.parse(data.choices[0].message.content).sectors;
}

async function getYahooData() {
  try {
    const proxy = 'https://api.allorigins.win/raw?url=';
    const target = 'https://finance.yahoo.com/markets/stocks/gainers/';
    const r = await fetch(proxy + encodeURIComponent(target));
    const html = await r.text();
    const matches = html.match(/\b([A-Z]{2,5})\b/g) || [];
    return [...new Set(matches)].slice(0, 15);
  } catch { return []; }
}

async function runAnalysis() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:80px;"><span class="spin"></span><br><br>正在掃描供應鏈連動性與市場噪音...</div>';
  
  try {
    const tickers = await getYahooData();
    const pulse = document.getElementById('marketPulse').value;
    const result = await callGroq(BUILD_PROMPT(pulse, tickers));
    
    sectors = result;
    render();
    document.getElementById('lastUpdate').textContent = '最後更新: ' + new Date().toLocaleTimeString();
  } catch (e) {
    grid.innerHTML = '<div style="color:red;padding:20px;">分析失敗: ' + e.message + '</div>';
  }
}

function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = sectors.map(s => `
    <div class="card ${s.rank <= 5 ? 'hot' : ''}">
      <div class="card-header">
        <span class="card-name">#${s.rank} ${s.name}</span>
        <span class="conf-badge ${s.conf}">${s.conf === 'high' ? '🔥 產業推進' : '⚠️ 公司噪音'}</span>
      </div>
      <div class="reason">${s.reason}</div>
      <div class="stocks">
        ${s.stocks.map(t => `<a href="https://www.tradingview.com/symbols/${t}/" target="_blank" class="tag">${t}</a>`).join('')}
      </div>
    </div>
  `).join('');
}

document.getElementById('startBtn').onclick = () => {
  apiKey = document.getElementById('keyInput').value.trim();
  if(!apiKey.startsWith('gsk_')) return alert('Key 格式不正確');
  localStorage.setItem('groq_stock_key_v23', apiKey);
  document.getElementById('setup').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  runAnalysis();
};

document.getElementById('refBtn').onclick = runAnalysis;

window.onload = () => {
  const saved = localStorage.getItem('groq_stock_key_v23');
  if(saved) {
    apiKey = saved;
    document.getElementById('setup').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    runAnalysis();
  }
};
</script>
</body>
</html>
